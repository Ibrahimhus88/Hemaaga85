<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Mini Projects</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Tasks OF Mini Projects</h1>


    <section class="project">

        <h2>Mini Project 1 : To Do List CRUD</h2>

        <div class="todo-box">

            <input type="text" id="taskInput" placeholder="Enter Task">
            <button onclick="addTask()">Add Task</button>

            <div id="taskList"></div>

        </div>

    </section>


    <section class="project">

        <h2>Mini Project 2 : Color Palette Generator</h2>

        <button onclick="generatePalette()">Generate Colors</button>

        <div class="palette" id="palette"></div>

    </section>




    <section class="project">

        <h2>Mini Project 3 : Dynamic Table Generator</h2>

        <button onclick="generateTable()">Generate Table</button>

        <div id="tableContainer"></div>

    </section>

</div>

<footer class="footer">
    <p>Created By Ibrahim Gamal Hussien Abdelzaher</p>
</footer>

<script src="main.js"></script>
</body>
</html>
